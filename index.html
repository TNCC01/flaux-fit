<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FIT">
<meta name="theme-color" content="#0d9488">
<title>FIT — Flaux workout timer</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<style>
  :root {
    --bg: #050a0a;
    --bg-2: #0a1414;
    --card: #0f1c1c;
    --card-hi: #14292a;
    --border: #1f3333;
    --text: #f0fdfa;
    --muted: #94a3b8;

    --teal:        #14b8a6;
    --teal-deep:   #0d9488;
    --teal-bright: #2dd4bf;

    --work:    #14b8a6;
    --rest:    #ef4444;
    --warmup:  #0d9488;
    --accent:  #14b8a6;
    --accent-b:#fbbf24;

    --whole:      #f59e0b;
    --upper:      #22d3ee;
    --lower:      #10b981;
    --core:       #f43f5e;
    --stretching: #a855f7;

    --grad-primary:    linear-gradient(135deg, #14b8a6 0%, #0d9488 100%);
    --grad-primary-hi: linear-gradient(135deg, #2dd4bf 0%, #14b8a6 100%);
    --glow-teal:       0 6px 22px rgba(20,184,166,0.25);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background:
      radial-gradient(1200px 600px at 20% -10%, rgba(20,184,166,0.10), transparent 60%),
      radial-gradient(900px 500px at 90% 110%, rgba(13,148,136,0.08), transparent 60%),
      var(--bg);
    background-attachment: fixed;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    min-height: 100vh;
  }
  body { padding: env(safe-area-inset-top, 0.75rem) 0.75rem env(safe-area-inset-bottom, 1rem); }

  .app { max-width: 1100px; margin: 0 auto; }
  .view { display: none; flex-direction: column; gap: 0.85rem; }
  .view.active { display: flex; }
  #workoutView.active { background-color: var(--bg); }

  button {
    background: var(--grad-primary);
    color: #fff;
    border: none;
    padding: 1rem;
    font-size: 1.15rem;
    font-weight: 800;
    border-radius: 1rem;
    cursor: pointer;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    box-shadow: var(--glow-teal), inset 0 1px 0 rgba(255,255,255,0.12);
  }
  button.secondary {
    background: var(--card);
    color: var(--text);
    border: 2px solid var(--border);
    box-shadow: none;
  }
  button:active { transform: scale(0.97); }
  button.running { background: linear-gradient(135deg, #f59e0b, #d97706); box-shadow: 0 6px 22px rgba(245,158,11,0.25); }

  /* ============== Menu view ============== */
  .brand-bar {
    display: flex;
    align-items: center;
    gap: 0.85rem;
    padding: 1rem 1.15rem;
    background:
      linear-gradient(135deg, rgba(20,184,166,0.14), rgba(13,148,136,0.05) 60%),
      var(--card);
    border: 1px solid rgba(20,184,166,0.22);
    border-radius: 1.25rem;
    box-shadow: 0 8px 28px rgba(20,184,166,0.08);
  }
  .brand-icon {
    width: 46px;
    height: 46px;
    flex-shrink: 0;
    color: var(--teal-bright);
    filter: drop-shadow(0 2px 6px rgba(20,184,166,0.4));
  }
  .brand-text { display: flex; flex-direction: column; line-height: 1; }
  .brand-name {
    font-size: 2.1rem;
    font-weight: 900;
    letter-spacing: -0.04em;
    line-height: 0.95;
    background: linear-gradient(135deg, #5eead4, #14b8a6 70%);
    -webkit-background-clip: text;
            background-clip: text;
    color: transparent;
  }
  .brand-sub {
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 0.28em;
    margin-top: 0.35rem;
    font-weight: 700;
  }

  .menu-header {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
    padding: 0.25rem 0.25rem;
  }
  .menu-title {
    font-size: 1.4rem;
    font-weight: 800;
    letter-spacing: -0.01em;
  }
  .menu-sub {
    color: var(--muted);
    font-size: 0.9rem;
    line-height: 1.4;
  }

  .picker-row {
    background: var(--card);
    border-radius: 1rem;
    padding: 0.85rem 1rem;
  }
  .picker-label {
    font-size: 0.85rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 700;
    margin-bottom: 0.55rem;
  }
  .chip-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.45rem;
  }
  .chip {
    background: var(--bg);
    color: var(--text);
    border: 2px solid var(--border);
    padding: 0.55rem 0.9rem;
    border-radius: 999px;
    cursor: pointer;
    font-size: 1rem;
    font-weight: 600;
    -webkit-tap-highlight-color: transparent;
  }
  .chip:active { transform: scale(0.97); }
  .chip.active {
    background: var(--grad-primary);
    border-color: transparent;
    color: #fff;
    box-shadow: 0 2px 10px rgba(20,184,166,0.3);
  }
  .people-chip { min-width: 95px; text-align: center; font-size: 1.05rem; }
  .name-inputs {
    display: flex;
    gap: 0.45rem;
    margin-top: 0.55rem;
  }
  .name-inputs.hidden { display: none; }
  .name-inputs input {
    flex: 1;
    min-width: 0;
    background: var(--bg);
    color: var(--text);
    border: 2px solid var(--border);
    border-radius: 999px;
    padding: 0.55rem 0.9rem;
    font-size: 1rem;
    font-weight: 600;
    font-family: inherit;
  }
  .name-inputs input::placeholder { color: var(--muted); font-weight: 500; }
  .name-inputs input:focus {
    outline: none;
    border-color: var(--teal);
    box-shadow: 0 2px 10px rgba(20,184,166,0.25);
  }

  .workout-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 0.75rem;
  }
  .workout-card {
    background:
      linear-gradient(135deg, rgba(20,184,166,0.06) 0%, transparent 50%),
      var(--card);
    border: 2px solid var(--border);
    border-left-width: 6px;
    border-radius: 1rem;
    padding: 1rem 1.1rem;
    cursor: pointer;
    text-align: left;
    color: var(--text);
    -webkit-tap-highlight-color: transparent;
    display: flex;
    flex-direction: column;
    gap: 0.45rem;
    box-shadow: none;
    transition: transform 0.15s, box-shadow 0.2s, border-color 0.2s;
  }
  .workout-card:active { transform: scale(0.98); }
  .workout-card:hover {
    border-color: rgba(20,184,166,0.35);
    box-shadow: 0 8px 28px rgba(20,184,166,0.12);
  }
  .workout-card.whole { border-left-color: var(--whole); }
  .workout-card.upper { border-left-color: var(--upper); }
  .workout-card.lower { border-left-color: var(--lower); }
  .workout-card.core  { border-left-color: var(--core); }
  .workout-card.stretching { border-left-color: var(--stretching); }
  .card-name {
    font-size: 1.35rem;
    font-weight: 800;
    letter-spacing: -0.01em;
  }
  .card-tagline {
    color: var(--muted);
    font-size: 0.95rem;
    font-style: italic;
  }
  .card-meta {
    display: flex;
    gap: 0.6rem;
    margin-top: 0.15rem;
    font-size: 0.85rem;
    color: var(--muted);
    font-weight: 600;
    flex-wrap: wrap;
  }
  .card-meta .duration { color: var(--text); }
  .card-meta .focus-tag.whole { color: var(--whole); }
  .card-meta .focus-tag.upper { color: var(--upper); }
  .card-meta .focus-tag.lower { color: var(--lower); }
  .card-meta .focus-tag.core  { color: var(--core); }
  .card-meta .focus-tag.stretching { color: var(--stretching); }
  .card-blurb {
    color: var(--muted);
    font-size: 0.95rem;
    line-height: 1.35;
  }
  .card-time-detail {
    color: var(--muted);
    font-size: 0.82rem;
    font-weight: 600;
    margin-top: -0.2rem;
  }
  .card-adapted {
    color: var(--teal-bright);
    font-size: 0.85rem;
    font-weight: 700;
  }
  .card-adapted::before { content: '↻ '; }
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    color: var(--muted);
    padding: 2rem;
  }

  /* ============== Workout view ============== */
  .top-bar {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.5rem 0.25rem;
  }
  .back-btn {
    background: var(--card);
    color: var(--text);
    border: 2px solid var(--border);
    padding: 0.55rem 0.9rem;
    border-radius: 0.75rem;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .workout-title {
    font-size: 1.15rem;
    font-weight: 800;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .people-badge {
    color: var(--muted);
    font-size: 0.85rem;
    background: var(--card);
    padding: 0.4rem 0.7rem;
    border-radius: 0.75rem;
    font-weight: 700;
    white-space: nowrap;
  }

  .progress-bar-wrap {
    background: var(--card);
    border-radius: 999px;
    height: 6px;
    overflow: hidden;
  }
  .progress-bar {
    background: var(--accent);
    height: 100%;
    width: 0%;
    transition: width 0.3s ease;
  }

  .block-info {
    background: var(--card);
    padding: 0.75rem 1rem;
    border-radius: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.45rem;
  }
  .block-name {
    font-weight: 700;
    font-size: 1.15rem;
    line-height: 1.25;
  }
  .round-dots {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }
  .round-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
  }
  .round-count {
    color: var(--text);
    font-size: 1.05rem;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
  }
  .round-count .of { color: var(--muted); font-weight: 700; }
  .remaining-tag {
    color: var(--muted);
    font-size: 0.85rem;
    font-weight: 700;
    white-space: nowrap;
  }
  .seg-row {
    display: flex;
    gap: 0.28rem;
  }
  .seg {
    flex: 1;
    height: 14px;
    border-radius: 4px;
    background: rgba(148,163,184,0.22);
  }
  .seg.done { background: var(--muted); }

  .timer-card {
    background: var(--card);
    border-radius: 1.5rem;
    padding: 1.25rem 1rem;
    text-align: center;
    border: 2px solid transparent;
  }

  .phase-label {
    text-transform: uppercase;
    letter-spacing: 0.25em;
    font-size: 1.15rem;
    font-weight: 800;
    color: var(--muted);
  }
  .timer-card.work .phase-label { color: var(--work); }
  .timer-card.rest .phase-label,
  .timer-card.blockrest .phase-label { color: var(--rest); }
  .timer-card.warmup .phase-label,
  .timer-card.cooldown .phase-label { color: var(--warmup); }
  .timer-card.stretch .phase-label { color: var(--stretching); }

  .time-display {
    font-size: 8rem;
    font-weight: 900;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    margin: 0.25rem 0;
    letter-spacing: -0.05em;
  }
  .total-time {
    color: var(--muted);
    font-size: 0.95rem;
    font-variant-numeric: tabular-nums;
  }

  .exercise-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }
  .exercise-grid.solo { grid-template-columns: 1fr; }
  .person {
    background: var(--card);
    border-radius: 1.25rem;
    padding: 1.1rem;
    border: 2px solid var(--border);
    display: flex;
    flex-direction: column;
    min-height: 120px;
  }
  .person.a { border-top: 6px solid var(--accent); }
  .person.b { border-top: 6px solid var(--accent-b); }
  .exercise-grid.solo .person.a { border-top-color: var(--accent); }
  .person-label {
    font-size: 0.85rem;
    font-weight: 800;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.35rem;
  }
  .person.a .person-label { color: var(--accent); }
  .person.b .person-label { color: var(--accent-b); }
  .exercise {
    font-size: 1.4rem;
    font-weight: 700;
    line-height: 1.25;
  }
  .alternative {
    font-size: 0.95rem;
    color: var(--muted);
    line-height: 1.4;
    margin-top: 0.6rem;
    padding-top: 0.6rem;
    border-top: 1px solid var(--border);
    display: none;
  }
  body.show-alternatives .alternative.has-alt { display: block; }
  .alternative::before {
    content: 'Injury alt: ';
    font-weight: 700;
    color: var(--accent);
  }

  .upcoming {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.75rem 1rem;
    border-radius: 1rem;
    background: var(--card);
    border: 2px solid var(--border);
  }
  .upcoming .swatch {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .upcoming .txt {
    font-size: 1.02rem;
    font-weight: 600;
    color: var(--text);
  }
  .upcoming .txt strong { font-weight: 800; }
  .upcoming .eyebrow {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--muted);
    font-weight: 800;
    display: block;
    margin-bottom: 0.1rem;
  }

  .controls {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr;
    gap: 0.6rem;
  }
  .preview-card {
    background: var(--card);
    border-radius: 1rem;
    padding: 0.9rem 1rem;
  }
  .preview-title {
    font-size: 0.85rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 700;
    margin-bottom: 0.6rem;
  }
  .preview-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0.65rem;
  }
  .preview-item-name { font-weight: 700; font-size: 1rem; line-height: 1.3; }
  .preview-item-sub {
    color: var(--muted);
    font-size: 0.9rem;
    line-height: 1.4;
    margin-top: 0.1rem;
  }
  .toggle-row {
    display: flex;
    justify-content: space-around;
    gap: 1rem;
    padding: 0.7rem 1rem;
    background: var(--card);
    border-radius: 1rem;
    font-size: 0.95rem;
    flex-wrap: wrap;
  }
  .toggle {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    cursor: pointer;
    user-select: none;
  }
  .toggle input {
    width: 1.25rem; height: 1.25rem;
    cursor: pointer;
    accent-color: var(--accent);
  }

  @media (max-width: 700px) {
    .time-display { font-size: 5.5rem; }
    .exercise-grid { grid-template-columns: 1fr; }
    .exercise { font-size: 1.2rem; }
    .menu-title { font-size: 1.5rem; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- ============== MENU VIEW ============== -->
  <div class="view active" id="menuView">
    <div class="brand-bar">
      <svg class="brand-icon" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="32" cy="42" r="16" fill="currentColor"/>
        <path d="M20 22 V14 a4 4 0 0 1 4-4 h16 a4 4 0 0 1 4 4 V22" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
      </svg>
      <div class="brand-text">
        <div class="brand-name">FIT</div>
        <div class="brand-sub">BY FLAUX</div>
      </div>
    </div>

    <div class="menu-header">
      <div class="menu-title">Pick your workout</div>
      <div class="menu-sub">Tap off any gear you don't have today — workouts adapt to bodyweight versions automatically.</div>
    </div>

    <div class="picker-row">
      <div class="picker-label">How many of you?</div>
      <div class="chip-row" id="peoplePicker">
        <button class="chip people-chip" data-people="1">1 person</button>
        <button class="chip people-chip" data-people="2">2 people</button>
      </div>
      <div class="name-inputs" id="nameInputs">
        <input type="text" id="nameA" placeholder="Person A (optional)" maxlength="14" autocomplete="off" enterkeyhint="done">
        <input type="text" id="nameB" placeholder="Person B (optional)" maxlength="14" autocomplete="off" enterkeyhint="done">
      </div>
    </div>

    <div class="picker-row">
      <div class="picker-label">Equipment on hand</div>
      <div class="chip-row" id="equipmentPicker"></div>
    </div>

    <div class="picker-row">
      <div class="picker-label">Time</div>
      <div class="chip-row" id="timeFilter"></div>
    </div>

    <div class="picker-row">
      <div class="picker-label">Focus</div>
      <div class="chip-row" id="focusFilter"></div>
    </div>

    <div class="workout-grid" id="workoutGrid"></div>
  </div>

  <!-- ============== WORKOUT VIEW ============== -->
  <div class="view" id="workoutView">
    <div class="top-bar">
      <button class="back-btn" id="btnBack">← Menu</button>
      <div class="workout-title" id="workoutTitle">—</div>
      <div class="people-badge" id="peopleBadge">2 people</div>
    </div>

    <div class="progress-bar-wrap">
      <div class="progress-bar" id="overallProgress"></div>
    </div>

    <div class="block-info">
      <div class="block-name" id="blockName">—</div>
      <div class="round-dots" id="roundDots"></div>
    </div>

    <div class="timer-card warmup" id="timerCard">
      <div class="phase-label" id="phaseLabel">Press start</div>
      <div class="time-display" id="timeDisplay">--:--</div>
      <div class="total-time" id="totalTime">Total 0:00</div>
    </div>

    <div class="exercise-grid" id="exerciseGrid">
      <div class="person a">
        <div class="person-label" id="labelA">Person A</div>
        <div class="exercise" id="exerciseA">—</div>
        <div class="alternative" id="alternativeA"></div>
      </div>
      <div class="person b" id="personB">
        <div class="person-label" id="labelB">Person B</div>
        <div class="exercise" id="exerciseB">—</div>
        <div class="alternative" id="alternativeB"></div>
      </div>
    </div>

    <div class="upcoming" id="upcoming"></div>

    <div class="controls">
      <button id="btnStart">Start</button>
      <button class="secondary" id="btnSkip">Skip block</button>
      <button class="secondary" id="btnReset">Reset</button>
    </div>

    <div class="preview-card" id="previewCard">
      <div class="preview-title">Workout preview</div>
      <ol class="preview-list" id="previewList"></ol>
    </div>

    <div class="toggle-row">
      <label class="toggle">
        <input type="checkbox" id="showAlts">
        Show injury alternatives
      </label>
      <label class="toggle">
        <input type="checkbox" id="muteAudio">
        Mute audio
      </label>
    </div>
  </div>

</div>

<script>
// =====================================================================
// EXERCISE DICTIONARY
// Equipment on hand: 15kg KB, 10kg KB, 10kg barbell, dumbbells (set),
// skipping rope, gymnastic rings, gravel driveway (~1 min round trip).
// Each exercise: task, alt (injury alternative), equipment (ids from
// EQUIPMENT; empty = bodyweight, always available), and bw — the
// exercise id to swap to when its equipment is deselected in the menu.
// Constraint: never assign a single-instance item (KBs, barbell, rope,
// rings) to both people in the same round. Bodyweight fallbacks never
// add equipment, so adapting can't break this rule.
// =====================================================================
const EQUIPMENT = {
  kb15:      '15kg kettlebell',
  kb10:      '10kg kettlebell',
  barbell10: '10kg barbell',
  dumbbells: 'Dumbbells',
  rope:      'Skipping rope',
  rings:     'Rings'
};
const DEFAULT_EQUIPMENT = { kb15: true, kb10: true, barbell10: true, dumbbells: true, rope: true, rings: true };

const EXERCISES = {
  // --- Bodyweight: whole body ----------------------------------------
  airSquat:        { task: 'Air squats', alt: 'Box squat to a chair', equipment: [] },
  tempoSquat:      { task: 'Bodyweight squat with a slow 3s descent', alt: 'Box squat to a chair', equipment: [] },
  pushup:          { task: 'Push-ups', alt: 'Incline push-ups (hands on bench)', equipment: [] },
  burpee:          { task: 'Burpees', alt: 'Step-back burpees (no jump)', equipment: [] },
  jumpingJacks:    { task: 'Jumping jacks', alt: 'Step jacks (no jump)', equipment: [] },
  highKnees:       { task: 'High knees in place', alt: 'Marching in place', equipment: [] },
  skaterHops:      { task: 'Skater hops side to side', alt: 'Side steps with a reach', equipment: [] },
  bearCrawl:       { task: 'Bear crawl forward & back', alt: 'Bear hold (knees hovering)', equipment: [] },
  inchworm:        { task: 'Inchworm walkouts', alt: 'Walkouts, knees down on the return', equipment: [] },

// Resolve an exercise id against the equipment currently selected in the
// menu, walking bw fallbacks until everything required is on hand.
const hasEquip = (id) => state.equipment[id] !== false;
function resolveEx(id) {
  let cur = EXERCISES[id];
  let adapted = false;
  let guard = 0;
  while (cur && !cur.equipment.every(hasEquip) && cur.bw && guard++ < 6) {
    cur = EXERCISES[cur.bw];
    adapted = true;
  }
  return { task: cur.task, alt: cur.alt, adapted };
}

// --- Block helpers ----------------------------------------------------
// Both people do the same exercise (no equipment conflict).
function blockSame(name, exId) {
  return {
    name, ids: [exId],
    duo:  () => { const ex = resolveEx(exId); return { a: ex, b: ex }; },
    solo: () => resolveEx(exId)
  };
}

// Two exercises alternate between A and B each round.
// Solo mode alternates the two exercises round-by-round.
function blockAlt(name, idA, idB) {
  return {
    name, ids: [idA, idB],
    duo: (round) => {
      const A = resolveEx(idA), B = resolveEx(idB);
      return (round % 2 === 1) ? { a: A, b: B } : { a: B, b: A };
    },
    solo: (round) => resolveEx(round % 2 === 1 ? idA : idB)
  };
}

// A list of exercises cycled round-by-round for variety; A and B are
// always on neighbouring list entries, so single-instance equipment must
// never appear on two adjacent entries (wrap-around included).
function blockCycle(name, ids) {
  return {
    name, ids,
    duo: (round) => ({
      a: resolveEx(ids[(round - 1) % ids.length]),
      b: resolveEx(ids[round % ids.length])
    }),
    solo: (round) => resolveEx(ids[(round - 1) % ids.length])
  };
}

// Single exercise with two weights — swap between A and B at round 5.
function blockSwap(name, heavyId, lightId) {
  return {
    name, ids: [heavyId, lightId],
    duo: (round) => {
      const swap = round > 4;
      const h = resolveEx(heavyId), l = resolveEx(lightId);
      return swap ? { a: l, b: h } : { a: h, b: l };
    },
    solo: (round) => resolveEx(round > 4 ? lightId : heavyId)
  };
}

// KB clean & press: alternates left/right arm each round, weight swap at
// round 5. The arm cue is dropped when the exercise adapts to bodyweight.
function blockCleanPress() {
  const arm = (round) => round % 2 === 1 ? ' (left arm)' : ' (right arm)';
  const withArm = (ex, round) => ex.adapted ? ex : { ...ex, task: ex.task + arm(round) };
  return {
    name: 'KB clean & press (alt arms)',
    ids: ['kbCleanPress15', 'kbCleanPress10'],
    duo: (round) => {
      const swap = round > 4;
      const h = resolveEx('kbCleanPress15'), l = resolveEx('kbCleanPress10');
      return swap
        ? { a: withArm(l, round), b: withArm(h, round) }
        : { a: withArm(h, round), b: withArm(l, round) };
    },
    solo: (round) => withArm(resolveEx(round > 4 ? 'kbCleanPress10' : 'kbCleanPress15'), round)
  };
}

}

// SEQUENCE BUILDER
// =====================================================================
const warmupExercise = {
  task: 'Easy movement — skip / arm circles / squats / lunges / shake out',
  alt: 'Walk + gentle dynamic stretches'
};
const cooldownExercise = {
  task: 'Walk, deep breaths, stretch hammies / hips / shoulders / chest',
  alt: ''
};

const TABATA = { rounds: 8, workSec: 20, restSec: 10 };

// Real phase math for the menu labels — same numbers buildSequence uses,
// so the cards can never drift from what the timer actually runs.
function durationParts(w) {
  if (w.format === 'stretch') {
    const total = w.stretches.reduce((s, st) => s + st.hold, 0);
    return { totalMin: Math.round(total / 60), workMin: null, bookendsMin: null };
  }
  const work = w.blocks.length * TABATA.rounds * (TABATA.workSec + TABATA.restSec)
             + (w.blocks.length - 1) * w.blockRestSec;
  const workMin = Math.round(work / 60);
  const bookendsMin = Math.round((w.warmupSec + w.cooldownSec) / 60);
  return { totalMin: workMin + bookendsMin, workMin, bookendsMin };
}

function buildSequence(workout, people) {
  const seq = [];
  const isDuo = people === 2;
  const pair = (ex) => isDuo ? { a: ex, b: ex } : { a: ex, b: null };

  if (workout.format === 'tabata') {
    if (workout.warmupSec > 0) {
      seq.push({
        kind: 'warmup',
        duration: workout.warmupSec,
        name: `Warm-up — ${Math.round(workout.warmupSec / 60 * 10) / 10} min`,
        ...pair(warmupExercise)
      });
    }

    workout.blocks.forEach((block, blockIdx) => {
      for (let round = 1; round <= TABATA.rounds; round++) {
        let work;
        if (isDuo) {
          const d = block.duo(round);
          work = { a: d.a, b: d.b };
        } else {
          const s = block.solo(round);
          work = { a: s, b: null };
        }
        seq.push({
          kind: 'work',
          duration: TABATA.workSec,
          blockIdx, round, totalBlocks: workout.blocks.length, totalRounds: TABATA.rounds,
          name: `Block ${blockIdx + 1} of ${workout.blocks.length}: ${block.name}`,
          a: work.a, b: work.b
        });
        seq.push({
          kind: 'rest',
          duration: TABATA.restSec,
          blockIdx, round, totalBlocks: workout.blocks.length, totalRounds: TABATA.rounds,
          name: `Block ${blockIdx + 1} of ${workout.blocks.length}: ${block.name}`,
          ...pair({ task: 'Rest — breathe', alt: '' })
        });
      }
      if (blockIdx < workout.blocks.length - 1) {
        seq.push({
          kind: 'blockrest',
          duration: workout.blockRestSec,
          blockIdx, totalBlocks: workout.blocks.length,
          name: `Rest — next: Block ${blockIdx + 2}: ${workout.blocks[blockIdx + 1].name}`,
          ...pair({ task: 'Hydrate, reset, swap equipment if needed', alt: '' })
        });
      }
    });

    if (workout.cooldownSec > 0) {
      seq.push({
        kind: 'cooldown',
        duration: workout.cooldownSec,
        name: `Cool-down — ${Math.round(workout.cooldownSec / 60 * 10) / 10} min`,
        ...pair(cooldownExercise)
      });
    }
  } else if (workout.format === 'stretch') {
    workout.stretches.forEach((stretch, idx) => {
      seq.push({
        kind: 'stretch',
        duration: stretch.hold,
        stretchIdx: idx,
        totalStretches: workout.stretches.length,
        name: `Stretch ${idx + 1} of ${workout.stretches.length}: ${stretch.name}`,
        ...pair({ task: stretch.name, alt: stretch.alt })
      });
    });
  }
  return seq;
}

// =====================================================================
// AUDIO (Web Audio API)
// =====================================================================
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function beep(freq, duration, volume = 0.4) {
  if (state.muteAudio) return;
  try {
    ensureAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.frequency.value = freq;
    osc.type = 'sine';
    gain.gain.setValueAtTime(volume, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  } catch (e) {}
}
// New round starting: a bright bell ding (fundamental + soft overtone).
function workChime() {
  beep(880, 0.12, 0.4);
  setTimeout(() => { beep(1320, 0.6, 0.5); beep(1980, 0.5, 0.12); }, 140);
}
// Round over: a harsh two-oscillator square-wave buzz.
function restChime() {
  if (state.muteAudio) return;
  try {
    ensureAudio();
    const duration = 0.45;
    const gain = audioCtx.createGain();
    gain.connect(audioCtx.destination);
    gain.gain.setValueAtTime(0.22, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.22, audioCtx.currentTime + duration - 0.08);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    [160, 163].forEach(f => {
      const osc = audioCtx.createOscillator();
      osc.type = 'square';
      osc.frequency.value = f;
      osc.connect(gain);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    });
  } catch (e) {}
}
function stretchChime() { beep(660, 0.4, 0.35); }
function bigBell() {
  beep(660, 0.25, 0.5);
  setTimeout(() => beep(880, 0.25, 0.5), 220);
  setTimeout(() => beep(1320, 0.45, 0.5), 460);
}
function tick() { beep(700, 0.08, 0.3); }

// =====================================================================
// WAKE LOCK
// =====================================================================
async function requestWakeLock() {
  if ('wakeLock' in navigator) {
    try { state.wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
  }
}
function releaseWakeLock() {
  if (state.wakeLock) { state.wakeLock.release(); state.wakeLock = null; }
}

  'stretching': 'Stretching'
};

function uniqueDurations() {
  const set = new Set(workouts.map(w => durationParts(w).totalMin));
  return Array.from(set).sort((a, b) => a - b);
}

// True when any exercise in the workout would swap to its bodyweight
// fallback under the current equipment selection.
function workoutAdapted(w) {
  if (w.format === 'stretch') return false;
  return w.blocks.some(b => (b.ids || []).some(id => resolveEx(id).adapted));
}

function renderPeoplePicker() {
  els.peoplePicker.querySelectorAll('.chip').forEach(chip => {
    chip.classList.toggle('active', Number(chip.dataset.people) === state.people);
  });
  els.nameInputs.classList.toggle('hidden', state.people !== 2);
}

// Display names for the two people; falls back to Person A / Person B.
function personName(which) {
  const raw = which === 'a' ? state.nameA : state.nameB;
  const trimmed = (raw || '').trim();
  return trimmed || (which === 'a' ? 'Person A' : 'Person B');
}

function renderEquipmentPicker() {
  els.equipmentPicker.innerHTML = '';
  Object.keys(EQUIPMENT).forEach(id => {
    const b = document.createElement('button');
    b.className = 'chip' + (hasEquip(id) ? ' active' : '');
    b.textContent = EQUIPMENT[id];
    b.addEventListener('click', () => {
      state.equipment[id] = !hasEquip(id);
      savePrefs();
      renderEquipmentPicker();
      renderWorkoutGrid();
    });
    els.equipmentPicker.appendChild(b);
  });
}

function renderTimeFilter() {
  const durations = uniqueDurations();
  if (state.filterTime !== 'all' && !durations.includes(state.filterTime)) state.filterTime = 'all';
  const opts = [{ id: 'all', label: 'All' }, ...durations.map(d => ({ id: String(d), label: `${d} min` }))];
  els.timeFilter.innerHTML = '';
  opts.forEach(o => {
    const b = document.createElement('button');
    b.className = 'chip' + (String(state.filterTime) === o.id ? ' active' : '');
    b.textContent = o.label;
    b.addEventListener('click', () => {
      state.filterTime = o.id === 'all' ? 'all' : Number(o.id);
      savePrefs();
      renderTimeFilter();
      renderWorkoutGrid();
    });
    els.timeFilter.appendChild(b);
  });
}

function renderFocusFilter() {
  els.focusFilter.innerHTML = '';
  focusList.forEach(f => {
    const b = document.createElement('button');
    b.className = 'chip' + (state.filterFocus === f.id ? ' active' : '');
    b.textContent = f.label;
    b.addEventListener('click', () => {
      state.filterFocus = f.id;
      savePrefs();
      renderFocusFilter();
      renderWorkoutGrid();
    });
    els.focusFilter.appendChild(b);
  });
}

function renderWorkoutGrid() {
  els.workoutGrid.innerHTML = '';
  const filtered = workouts.filter(w =>
    (state.filterTime === 'all' || durationParts(w).totalMin === state.filterTime) &&
    (state.filterFocus === 'all' || w.focus === state.filterFocus)
  ).sort((a, b) => durationParts(a).totalMin - durationParts(b).totalMin);

  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.textContent = 'No workouts match those filters.';
    els.workoutGrid.appendChild(empty);
    return;
  }

  filtered.forEach(w => {
    const parts = durationParts(w);
    const detail = parts.workMin !== null
      ? `<div class="card-time-detail">${parts.workMin} min work + ${parts.bookendsMin} min warm-up/cool-down</div>`
      : '';
    const adapted = workoutAdapted(w)
      ? '<div class="card-adapted">Adapted for your equipment</div>'
      : '';
    const card = document.createElement('button');
    card.className = 'workout-card ' + focusClassMap[w.focus];
    card.innerHTML = `
      <div class="card-name">${w.name}</div>
      <div class="card-tagline">${w.tagline}</div>
      <div class="card-meta">
        <span class="duration">${parts.totalMin} min</span>
        <span>·</span>
        <span class="focus-tag ${focusClassMap[w.focus]}">${focusLabelMap[w.focus]}</span>
      </div>
      ${detail}
      <div class="card-blurb">${w.blurb}</div>
      ${adapted}
    `;
    card.addEventListener('click', () => openWorkout(w));
    els.workoutGrid.appendChild(card);
  });
}

function openWorkout(workout) {
  state.workout = workout;
  state.sequence = buildSequence(workout, state.people);
  state.totalDuration = state.sequence.reduce((s, p) => s + p.duration, 0);
  state.currentIdx = 0;
  state.remainingInPhase = state.sequence[0] ? state.sequence[0].duration : 0;
  state.elapsedTotal = 0;
  state.running = false;

  els.workoutTitle.textContent = workout.name;
  els.peopleBadge.textContent = state.people === 1
    ? '1 person'
    : ((state.nameA || '').trim() || (state.nameB || '').trim()
        ? `${personName('a')} & ${personName('b')}`
        : '2 people');
  els.exerciseGrid.classList.toggle('solo', state.people === 1);
  els.personB.style.display = state.people === 1 ? 'none' : '';
  els.labelA.textContent = state.people === 1 ? 'You' : personName('a');
  els.labelB.textContent = personName('b');

  if (state.sequence[0]) enterPhase(state.sequence[0].kind, state.remainingInPhase);
  renderPreview();
  setView('workout');
  render();
}

// Full exercise list shown before the workout starts (and after a reset).
// Resolved against the equipment selection active when the workout opened.
function renderPreview() {
  const w = state.workout;
  if (!w) return;
  els.previewList.innerHTML = '';
  const add = (name, sub) => {
    const li = document.createElement('li');
    const n = document.createElement('div');
    n.className = 'preview-item-name';
    n.textContent = name;
    li.appendChild(n);
    if (sub) {
      const s = document.createElement('div');
      s.className = 'preview-item-sub';
      s.textContent = sub;
      li.appendChild(s);
    }
    els.previewList.appendChild(li);
  };
  if (w.format === 'stretch') {
    w.stretches.forEach((s, i) => add(`${i + 1}. ${s.name}`, `${s.hold}s hold`));
  } else {
    add(`Warm-up — ${Math.round(w.warmupSec / 60)} min`, warmupExercise.task);
    w.blocks.forEach((b, i) => {
      const tasks = Array.from(new Set((b.ids || []).map(id => resolveEx(id).task)));
      add(`Block ${i + 1}: ${b.name}`, tasks.join('  ·  '));
    });
    add(`Cool-down — ${Math.round(w.cooldownSec / 60)} min`, cooldownExercise.task);
  }
}

function setView(v) {
  state.view = v;
  els.menuView.classList.toggle('active', v === 'menu');
  els.workoutView.classList.toggle('active', v === 'workout');
}

function goBackToMenu() {
  stopTimer();
  setView('menu');
  state.workout = null;
}

function fmt(s) {
  s = Math.max(0, Math.floor(s));
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

// Escape text (e.g. typed names) before it is placed into innerHTML.
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function setAlt(el, alt) {
  el.textContent = alt || '';
  el.classList.toggle('has-alt', !!alt);
}

function renderSegBar(current, total, kind) {
  const row = document.createElement('div');
  row.className = 'round-row';
  const count = document.createElement('div');
  count.className = 'round-count';
  count.innerHTML = `Round <b>${current}</b><span class="of"> of ${total}</span>`;
  const remaining = document.createElement('div');
  remaining.className = 'remaining-tag';
  remaining.textContent = `${total - current + 1} left`;
  row.appendChild(count);
  row.appendChild(remaining);
  els.roundDots.appendChild(row);

  const segRow = document.createElement('div');
  segRow.className = 'seg-row';
  const color = PHASE_COLOR[kind];
  for (let i = 1; i <= total; i++) {
    const s = document.createElement('div');
    s.className = 'seg';
    if (i < current) s.classList.add('done');
    else if (i === current && color) {
      s.classList.add('current');
      s.style.background = color.hex;
      s.style.boxShadow = `0 0 10px 2px rgba(${color.rgb},0.6)`;
    }
    segRow.appendChild(s);
  }
  els.roundDots.appendChild(segRow);
}

function renderRoundDots(phase) {
  els.roundDots.innerHTML = '';
  if (phase.totalRounds) {
    renderSegBar(phase.round, phase.totalRounds, phase.kind);
  } else if (phase.totalStretches) {
    renderSegBar(phase.stretchIdx + 1, phase.totalStretches, phase.kind);
  } else if (phase.totalBlocks) {
    const label = document.createElement('div');
    label.className = 'round-count';
    label.textContent = `Between blocks — ${phase.blockIdx + 1} → ${phase.blockIdx + 2} of ${phase.totalBlocks}`;
    els.roundDots.appendChild(label);
  }
}

// =====================================================================
// PHASE COLOR BLEED
// Card starts each phase with a bold solid-color border; as the countdown
// runs, the border bleeds out into an ambient wash behind the whole workout
// view, finishing fully bled right as the phase ends. Driven by a plain CSS
// transition (duration = the phase's remaining time) rather than per-tick
// JS restyling, so it stays smooth regardless of the 1s tick rate.
// =====================================================================
function setBleedStartState(kind) {
  const c = PHASE_COLOR[kind];
  els.timerCard.style.transition = 'none';
  els.workoutView.style.transition = 'none';
  if (!c) {
    els.timerCard.style.boxShadow = 'none';
    els.workoutView.style.backgroundImage = 'none';
    return;
  }
  els.timerCard.style.boxShadow =
    `inset 0 0 0 8px ${c.hex}, 0 0 0 3px rgba(${c.rgb},0.25), 0 0 40px rgba(${c.rgb},0.55)`;
  els.workoutView.style.backgroundImage =
    `radial-gradient(1000px 700px at 50% 0%, rgba(${c.rgb},0.06), transparent 65%)`;
}

function applyBleedEndState(kind) {
  const c = PHASE_COLOR[kind];
  if (!c) return;
  els.timerCard.style.boxShadow =
    `inset 0 0 0 0px ${c.hex}, 0 0 0 0px rgba(${c.rgb},0), 0 0 60px 16px rgba(${c.rgb},0.55)`;
  els.workoutView.style.backgroundImage =
    `radial-gradient(1000px 700px at 50% 0%, rgba(${c.rgb},0.34), transparent 65%)`;
}

function beginBleed(seconds) {
  const kind = state.sequence[state.currentIdx] ? state.sequence[state.currentIdx].kind : null;
  if (!kind || !PHASE_COLOR[kind] || seconds <= 0) return;
  void els.timerCard.offsetHeight; // force reflow so the transition below actually animates
  els.timerCard.style.transition = `box-shadow ${seconds}s linear`;
  els.workoutView.style.transition = `background-image ${seconds}s linear`;
  applyBleedEndState(kind);
}

function enterPhase(kind, seconds) {
  setBleedStartState(kind);
  if (state.running) beginBleed(seconds);
}

function freezeBleed() {
  const cardShadow = getComputedStyle(els.timerCard).boxShadow;
  const viewBgImage = getComputedStyle(els.workoutView).backgroundImage;
  els.timerCard.style.transition = 'none';
  els.workoutView.style.transition = 'none';
  els.timerCard.style.boxShadow = cardShadow;
  els.workoutView.style.backgroundImage = viewBgImage;
}

function clearBleed() {
  els.timerCard.style.transition = 'none';
  els.workoutView.style.transition = 'none';
  els.timerCard.style.boxShadow = 'none';
  els.workoutView.style.backgroundImage = 'none';
}

function render() {
  const phase = state.sequence[state.currentIdx];
  if (!phase) return;

  els.timerCard.className = 'timer-card ' + phase.kind;
  els.phaseLabel.textContent = ({
    work: 'Work', rest: 'Rest', blockrest: 'Block rest',
    warmup: 'Warm-up', cooldown: 'Cool-down', stretch: 'Stretch'
  })[phase.kind] || '';

  els.timeDisplay.textContent = fmt(state.remainingInPhase);
  els.totalTime.textContent = `Total ${fmt(state.elapsedTotal)} / ${fmt(state.totalDuration)}`;
  els.blockName.textContent = phase.name;
  els.overallProgress.style.width = `${Math.min(100, (state.elapsedTotal / state.totalDuration) * 100)}%`;

  renderRoundDots(phase);

  els.exerciseA.textContent = phase.a ? phase.a.task : '—';
  setAlt(els.alternativeA, phase.a ? phase.a.alt : '');
  if (state.people === 2 && phase.b) {
    els.exerciseB.textContent = phase.b.task;
    setAlt(els.alternativeB, phase.b.alt);
  }

  // Up next
  const next = state.sequence[state.currentIdx + 1];
  if (next) {
    const shortName = (which, fallback) => {
      const raw = (which === 'a' ? state.nameA : state.nameB) || '';
      return raw.trim() || fallback;
    };
    let preview;
    if (next.kind === 'rest') preview = `Rest ${TABATA.restSec}s`;
    else if (next.kind === 'work') {
      preview = state.people === 2
        ? `${shortName('a', 'A')}: ${next.a.task} · ${shortName('b', 'B')}: ${next.b.task}`
        : next.a.task;
    } else preview = next.name;
    const nextColor = PHASE_COLOR[next.kind];
    const swatchStyle = nextColor
      ? `background:${nextColor.hex};box-shadow:0 0 8px 1px rgba(${nextColor.rgb},0.7)`
      : '';
    els.upcoming.innerHTML = `
      <div class="swatch" style="${swatchStyle}"></div>
      <div class="txt"><span class="eyebrow">Up next</span><strong>${esc(preview)}</strong></div>
    `;
  } else {
    els.upcoming.innerHTML = '';
  }

  els.btnStart.textContent = state.running ? 'Pause' : (state.elapsedTotal > 0 ? 'Resume' : 'Start');
  els.btnStart.classList.toggle('running', state.running);

  els.previewCard.style.display = (!state.running && state.elapsedTotal === 0) ? '' : 'none';
}

// =====================================================================
// TIMER
// =====================================================================
function step() {
  state.remainingInPhase -= 1;
  state.elapsedTotal += 1;
  if (state.remainingInPhase === 3 || state.remainingInPhase === 2 || state.remainingInPhase === 1) tick();
  if (state.remainingInPhase <= 0) advancePhase();
  render();
}

function advancePhase() {
  state.currentIdx++;
  if (state.currentIdx >= state.sequence.length) { finish(); return; }
  const next = state.sequence[state.currentIdx];
  state.remainingInPhase = next.duration;
  enterPhase(next.kind, next.duration);
  if (next.kind === 'work') workChime();
  else if (next.kind === 'rest') restChime();
  else if (next.kind === 'blockrest') bigBell();
  else if (next.kind === 'cooldown') bigBell();
  else if (next.kind === 'stretch') stretchChime();
}

function finish() {
  stopTimer();
  bigBell();
  clearBleed();
  els.timerCard.className = 'timer-card';
  els.phaseLabel.textContent = 'Done';
  els.timeDisplay.textContent = '✓';
  els.blockName.textContent = 'Workout complete — nice work';
  els.roundDots.innerHTML = '';
  els.exerciseA.textContent = 'Well done.';
  setAlt(els.alternativeA, '');
  if (state.people === 2) { els.exerciseB.textContent = 'Well done.'; setAlt(els.alternativeB, ''); }
  els.upcoming.innerHTML = '';
  els.btnStart.textContent = 'Start over';
  els.btnStart.classList.remove('running');
  els.overallProgress.style.width = '100%';
}

function startTimer() {
  if (state.running) return;
  if (state.currentIdx >= state.sequence.length) resetWorkout();
  ensureAudio();
  requestWakeLock();
  state.running = true;
  workChime();
  state.intervalId = setInterval(step, 1000);
  beginBleed(state.remainingInPhase);
  render();
}
function pauseTimer() {
  freezeBleed();
  state.running = false;
  if (state.intervalId) { clearInterval(state.intervalId); state.intervalId = null; }
  releaseWakeLock();
  render();
}
function stopTimer() {
  state.running = false;
  if (state.intervalId) { clearInterval(state.intervalId); state.intervalId = null; }
  releaseWakeLock();
}
function resetWorkout() {
  stopTimer();
  state.currentIdx = 0;
  state.remainingInPhase = state.sequence[0] ? state.sequence[0].duration : 0;
  state.elapsedTotal = 0;
  if (state.sequence[0]) enterPhase(state.sequence[0].kind, state.remainingInPhase);
  render();
}

function skipBlock() {
  if (!state.sequence.length) return;
  const cur = state.sequence[state.currentIdx];
  let target = state.currentIdx + 1;

  if (cur.kind === 'stretch') {
    // Stretching: skip to next stretch only
    // (target is already next)
  } else {
    // Tabata: walk to next phase outside this block
    while (target < state.sequence.length) {
      const t = state.sequence[target];
      if (t.blockIdx !== undefined && t.blockIdx === cur.blockIdx && t.kind !== 'blockrest') target++;
      else break;
    }
  }
  let skipped = state.remainingInPhase;
  for (let i = state.currentIdx + 1; i < target; i++) skipped += state.sequence[i].duration;
  state.elapsedTotal += skipped;
  state.currentIdx = target;
  if (state.currentIdx >= state.sequence.length) { finish(); return; }
  state.remainingInPhase = state.sequence[state.currentIdx].duration;
  const k = state.sequence[state.currentIdx].kind;
  enterPhase(k, state.remainingInPhase);
  if (k === 'work') workChime();
  else if (k === 'blockrest') bigBell();
  else if (k === 'stretch') stretchChime();
  render();
}

// =====================================================================
// EVENT WIRING
// =====================================================================
els.peoplePicker.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    state.people = Number(chip.dataset.people);
    savePrefs();
    renderPeoplePicker();
  });
});

els.nameA.addEventListener('input', (e) => { state.nameA = e.target.value; savePrefs(); });
els.nameB.addEventListener('input', (e) => { state.nameB = e.target.value; savePrefs(); });

els.btnBack.addEventListener('click', goBackToMenu);

els.btnStart.addEventListener('click', () => {
  if (state.running) pauseTimer(); else startTimer();
});

// Two-tap reset (avoids confirm dialog)
let resetArmed = false;
let resetTimer = null;
els.btnReset.addEventListener('click', () => {
  if (resetArmed) {
    clearTimeout(resetTimer);
    resetArmed = false;
    els.btnReset.textContent = 'Reset';
    resetWorkout();
  } else {
    resetArmed = true;
    els.btnReset.textContent = 'Tap again';
    resetTimer = setTimeout(() => {
      resetArmed = false;
      els.btnReset.textContent = 'Reset';
    }, 2000);
  }
});
els.btnSkip.addEventListener('click', skipBlock);

els.showAlts.addEventListener('change', (e) => {
  state.showAlts = e.target.checked;
  document.body.classList.toggle('show-alternatives', state.showAlts);
  savePrefs();
});
els.muteAudio.addEventListener('change', (e) => {
  state.muteAudio = e.target.checked;
  savePrefs();
});

document.addEventListener('visibilitychange', () => {
  if (state.running && document.visibilityState === 'visible') requestWakeLock();
});

// =====================================================================
// INIT
// =====================================================================
loadPrefs();
els.nameA.value = state.nameA || '';
els.nameB.value = state.nameB || '';
els.showAlts.checked = state.showAlts;
els.muteAudio.checked = state.muteAudio;
document.body.classList.toggle('show-alternatives', state.showAlts);
renderPeoplePicker();
renderEquipmentPicker();
renderTimeFilter();
renderFocusFilter();
renderWorkoutGrid();
</script>
